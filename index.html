<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Under Maintenance</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e293b,#2563eb);
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
    overflow:hidden;
}

.container{
    max-width:700px;
    padding:40px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,.3);
}

.icon{
    font-size:80px;
    margin-bottom:20px;
    animation:rotate 4s linear infinite;
}

h1{
    font-size:42px;
    margin-bottom:15px;
}

p{
    font-size:18px;
    color:#e2e8f0;
    line-height:1.8;
}

.loader{
    margin:35px auto 20px;
    width:80%;
    height:10px;
    background:#ffffff30;
    border-radius:20px;
    overflow:hidden;
}

.loader span{
    display:block;
    height:100%;
    width:40%;
    background:#38bdf8;
    animation:loading 2s infinite;
}

footer{
    margin-top:30px;
    font-size:14px;
    color:#cbd5e1;
}

@keyframes loading{
    0%{margin-left:-40%;}
    100%{margin-left:100%;}
}

@keyframes rotate{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}
</style>
</head>

<body>

<div class="container">
    <div class="icon">⚙️</div>

    <h1>Website Under Maintenance</h1>

    <p>
        We're currently performing scheduled maintenance to improve our website.<br><br>
        <strong>Our website will be live soon.</strong><br>
        Thank you for your patience and understanding.
    </p>

    <div class="loader">
        <span></span>
    </div>

    <footer>
        &copy; 2026 Swastika Consultancy Services. All Rights Reserved.
    </footer>
</div>

</body>
</html>
