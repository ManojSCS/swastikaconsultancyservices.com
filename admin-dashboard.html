<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard | Swastika Consultancy Services</title>
  <link rel="stylesheet" href="admin-dashboard.css" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>Admin Panel</h2>
    <ul>
      <li class="active">Dashboard</li>
      <li>Clients</li>
      <li>Services</li>
      <li>Tasks</li>
      <li>Invoices</li>
      <li>Documents</li>
      <li>Reports</li>
      <li>Settings</li>
    </ul>
    <button onclick="logout()" class="logout-btn">Logout</button>
  </div>

  <!-- Main Content -->
  <div class="main">

    <header>
      <h1>Admin Dashboard</h1>
      <p>Manage all client operations from here</p>
    </header>

    <!-- Stats Cards -->
    <div class="cards">
      <div class="card">
        <h3>Total Clients</h3>
        <p id="totalClients">25</p>
      </div>
      <div class="card">
        <h3>Active Projects</h3>
        <p id="activeProjects">12</p>
      </div>
      <div class="card">
        <h3>Pending Tasks</h3>
        <p id="pendingTasks">7</p>
      </div>
      <div class="card">
        <h3>Revenue (This Month)</h3>
        <p id="revenue">₹85,000</p>
      </div>
    </div>

    <!-- Client List Section -->
    <div class="section">
      <h2>Recent Clients</h2>
      <!-- Table is rendered by admin-dashboard.js renderClients() -->
      <table id="clientTable"></table>
    </div>

  </div>

  <script src="admin-dashboard.js"></script>

</body>
</html>
